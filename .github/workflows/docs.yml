name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shdoc
        run: |
          sudo apt-get install -y gawk
          curl -sL https://raw.githubusercontent.com/reconquest/shdoc/v1.2/shdoc \
            -o /usr/local/bin/shdoc
          chmod +x /usr/local/bin/shdoc

      - name: Generate API docs
        run: |
          find lib/sh -name '*.sh' | sort | while IFS= read -r file; do
            module="${file#lib/sh/}"
            module="${module%/*}"
            outfile="docs/api/${module}/${file##*/}"
            outfile="${outfile%.sh}.md"
            mkdir -p "$(dirname "${outfile}")"
            shdoc < "${file}" > "${outfile}"
            # Drop empty files (no shdoc annotations found)
            [ -s "${outfile}" ] || rm -f "${outfile}"
          done
          # shdoc strips underscores from anchor links e.g. [func_name](#funcname)
          # but MkDocs generates anchors from headings preserving underscores (#func_name).
          # Fix by replacing the anchor with the link text, which retains underscores.
          # Also strip the ## Index section — sidebar navigation replaces it.
          while IFS= read -r f; do
            sed -i \
              -E 's/\[([a-zA-Z0-9_]+)\]\(#[a-z0-9]+\)/[\1](#\L\1)/g' \
              -e '/^## Index$/,/^###/{/^###/!d}' \
              "${f}"
          done < <(find docs/api -name '*.md')

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install mkdocs-shadcn mkdocs-awesome-pages-plugin

      - name: Deploy
        run: mkdocs gh-deploy --force
